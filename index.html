<!DOCTYPE html>
<html>
<head>
  <title>RETRO ENTRY</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Press Start 2P', monospace;
      color: white;

      background-image: url("forest.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    .box {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
      border: 2px solid white;
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    h1 {
      font-size: 26px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    p {
      margin-top: 15px;
      opacity: 0.85;
      text-transform: uppercase;
      font-size: 10px;
      line-height: 1.8;
    }

    button {
      margin-top: 25px;
      padding: 15px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      border: 2px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.2s;
    }

    button:hover {
      background: white;
      color: black;
      transform: scale(1.05);
    }

    /* 🔥 БЕГУЩАЯ СТРОКА */
    .marquee {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 0;
      overflow: hidden;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 3;
    }

    .marquee span {
      display: inline-block;
      white-space: nowrap;
      animation: scroll 10s linear infinite;
      padding-left: 100%;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="box">

    <h1>WELCOME</h1>

    <p>
      ENTER THE SITE<br>
      SYSTEM LOADING...<br>
      DO NOT TRUST THE SIGNAL
    </p>

    <a href="main.html">
      <button>ENTER</button>
    </a>

  </div>

  <!-- 🔥 бегущая строка -->
  <div class="marquee">
    <span>WARNING • THIS IS A RETRO SYSTEM • ENTER AT YOUR OWN RISK • SIGNAL UNSTABLE • WELCOME TO THE ARCHIVE •</span>
  </div>

</body>
</html>
